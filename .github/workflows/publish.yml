# This workflow will build a Java project with Gradle
# This file was contributed by EdwinBetanc0urt@outlook.com from ERP Consultores y Asociados, C.A
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: Publish Project

permissions:
  contents: write  # to upload release assets
  packages: write  # to publish Docker image to GHCR

on:
  release:
    types:
      - created

jobs:

  # Build dist application adempiere-grpc-server
  build-app:
    name: Build ADempiere gRPC Server
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-package: 'jdk'
          java-version: 17
          architecture: x64

      - name: Set Version Properties
        run: |
          echo "MAIN_VERSION=${{ github.event.release.name }}" >> src/main/java/org/spin/base/version.properties
          echo "DATE_VERSION=$(date +'%Y-%m-%d')" >> src/main/java/org/spin/base/version.properties
          echo "IMPLEMENTATION_VERSION=${{ github.event.release.tag_name }}" >> src/main/java/org/spin/base/version.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.0.0

      - name: Build with Gradle
        run: gradle createRelease --warning-mode all --stacktrace
        env:
          ORG_GRADLE_PROJECT_deployUsername: ${{ secrets.DEPLOY_USER }}
          ORG_GRADLE_PROJECT_deployToken: ${{ secrets.DEPLOY_TOKEN }}
          ORG_GRADLE_PROJECT_deployRepository: ${{ secrets.DEPLOY_REPOSITORY }}
          GITHUB_DEPLOY_USER: ${{ github.actor }}
          GITHUB_DEPLOY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_DEPLOY_REPOSITORY: ${{ secrets.DEPLOY_REPOSITORY }}

      - name: Prepare flat artifacts
        run: |
          mkdir -p flat_artifacts/
          cp build/descriptors/adempiere-grpc-server.dsc flat_artifacts/ || echo "Warning: .dsc file not found"
          cp build/release/adempiere-grpc-server.* flat_artifacts/ || echo "Warning: release files not found"
          cp resources/envoy.yaml flat_artifacts/ || echo "Warning: envoy.yaml not found"
          cp docker/env.yaml flat_artifacts/ || echo "Warning: env.yaml not found"
          ls -la flat_artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: flat_artifacts/*
          retention-days: 1


  publish-binaries:
    name: Publish Release Assets
    needs: build-app
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/

      - name: List Assets
        run: |
          tree artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            artifacts/adempiere-grpc-server.dsc
            artifacts/envoy.yaml
            artifacts/env.yaml
            artifacts/adempiere-grpc-server.zip.MD5
            artifacts/adempiere-grpc-server.zip
            artifacts/adempiere-grpc-server.tar.MD5
            artifacts/adempiere-grpc-server.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # Publish Docker image to GitHub Container Registry
  push-image-ghcr:
    name: Push Docker image to GitHub Container Registry
    needs: build-app
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/

      - name: Unzip Asset
        run: |
          unzip artifacts/adempiere-grpc-server.zip -d docker/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/alpine.Dockerfile
          push: true
          tags: |
            ghcr.io/adempiere/adempiere-grpc-server:${{ github.event.release.tag_name }}
            ghcr.io/adempiere/adempiere-grpc-server:latest
